<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频转文字工具</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Local Media Lab</p>
            <h1>视频链接 / 本地音频转文件</h1>
          </div>
          <button class="ghost" id="refreshFiles" type="button">刷新文件</button>
        </header>

        <form class="tool" id="jobForm">
          <div class="source-tabs" role="tablist" aria-label="输入来源">
            <label>
              <input type="radio" name="source_type" value="url" checked />
              <span>视频链接</span>
            </label>
            <label>
              <input type="radio" name="source_type" value="file" />
              <span>本地文件</span>
            </label>
          </div>

          <div class="source-panel" data-panel="url">
            <label class="field">
              <span>视频链接</span>
              <input name="url" placeholder="可粘贴完整抖音分享文案，工具会自动提取链接" />
            </label>
            <label class="switch">
              <input type="checkbox" name="browser_download" checked />
              <span>使用浏览器抓取模式</span>
            </label>
          </div>

          <div class="source-panel hidden" data-panel="file">
            <label class="filebox">
              <input type="file" name="upload" accept="audio/*,video/*,.m4a,.mp3,.wav,.mp4,.mov,.mkv,.webm,.txt,.md,.markdown,.srt,.vtt,text/plain,text/markdown" />
              <span>选择本地视频、音频或文稿</span>
            </label>
            <p class="hint">选择 txt / md / srt / vtt 时，会跳过转写，直接用文本生成文章。</p>
          </div>

          <div class="options">
            <fieldset>
              <legend>输出内容</legend>
              <label><input type="checkbox" name="save_video" /> 视频</label>
              <label><input type="checkbox" name="save_audio" checked /> 音频</label>
              <label><input type="checkbox" name="save_transcripts" checked /> 字幕 / 文稿</label>
              <label><input type="checkbox" name="generate_articles" id="generateArticles" /> 文章</label>
            </fieldset>

            <div class="article-panel hidden" id="articlePanel">
              <fieldset>
                <legend>文章风格</legend>
                <label><input type="checkbox" name="article_styles" value="xiaohongshu" checked /> 小红书风格</label>
                <label><input type="checkbox" name="article_styles" value="professional" checked /> 专业风格</label>
              </fieldset>
              <p class="hint">生成文章会自动先生成字幕 / 文稿，并输出到每个任务的 articles 文件夹。</p>
              <div class="grid">
                <label class="field">
                  <span>文章长度</span>
                  <select name="article_length">
                    <option value="standard">标准完整</option>
                    <option value="long" selected>长文展开</option>
                    <option value="deep">详细长文</option>
                  </select>
                </label>
                <label class="field">
                  <span>写作模型预设</span>
                  <select name="llm_preset" id="llmPresetSelect">
                    <option value="">读取配置中...</option>
                  </select>
                </label>
              </div>
              <div class="grid">
                <label class="field">
                  <span>LLM API Key</span>
                  <input name="llm_api_key" type="password" placeholder="留空则使用 LLM_API_KEY / MIMO_API_KEY" />
                </label>
                <label class="field">
                  <span>LLM Base URL</span>
                  <input name="llm_base_url" placeholder="留空则使用 LLM_BASE_URL / MIMO_BASE_URL" />
                </label>
              </div>
              <div class="grid">
                <label class="field">
                  <span>模型名覆盖</span>
                  <input name="llm_model" placeholder="留空则使用所选预设" />
                </label>
                <p class="hint model-note" id="llmPresetNote">模型预设来自 config/llm_models.json。</p>
              </div>
            </div>

            <div class="grid">
              <label class="field">
                <span>识别引擎</span>
                <select name="backend" id="backendSelect">
                  <option value="local" selected>本地 Whisper</option>
                  <option value="mimo">MiMo</option>
                </select>
              </label>
              <label class="field local-asr">
                <span>Whisper 模型</span>
                <select name="model">
                  <option value="tiny">tiny 快速</option>
                  <option value="base">base</option>
                  <option value="small" selected>small 推荐</option>
                  <option value="medium">medium 更准</option>
                  <option value="large-v3">large-v3</option>
                </select>
              </label>
              <label class="field">
                <span>语言</span>
                <select name="language">
                  <option value="zh" selected>中文</option>
                  <option value="">自动</option>
                  <option value="en">英文</option>
                  <option value="ja">日文</option>
                </select>
              </label>
            </div>

            <div class="grid local-asr">
              <label class="field">
                <span>设备</span>
                <select name="device">
                  <option value="cpu" selected>CPU</option>
                  <option value="cuda">CUDA</option>
                  <option value="auto">Auto</option>
                </select>
              </label>
              <label class="field">
                <span>计算类型</span>
                <select name="compute_type">
                  <option value="int8" selected>int8</option>
                  <option value="float16">float16</option>
                  <option value="float32">float32</option>
                </select>
              </label>
            </div>

            <div class="mimo-panel hidden" id="mimoPanel">
              <div class="grid">
                <label class="field">
                  <span>MiMo 模型</span>
                  <select name="mimo_model">
                    <option value="mimo-v2.5" selected>mimo-v2.5</option>
                    <option value="mimo-v2-omni">mimo-v2-omni</option>
                  </select>
                </label>
                <label class="field">
                  <span>API Key</span>
                  <input name="mimo_api_key" type="password" placeholder="留空则使用 MIMO_API_KEY 环境变量" />
                </label>
                <label class="field">
                  <span>Base URL</span>
                  <input name="mimo_base_url" placeholder="留空自动判断 sk- / tp-" />
                </label>
              </div>
            </div>
          </div>

          <button class="primary" type="submit">开始处理</button>
        </form>
      </section>

      <aside class="side">
        <section class="status">
          <div class="status-head">
            <h2>任务状态</h2>
            <span id="statusPill">待开始</span>
          </div>
          <pre id="logs">等待任务...</pre>
        </section>

        <section class="files">
          <h2>输出文件</h2>
          <div class="file-columns">
            <div>
              <h3>视频</h3>
              <ul id="videoFiles"></ul>
            </div>
            <div>
              <h3>音频</h3>
              <ul id="audioFiles"></ul>
            </div>
            <div>
              <h3>字幕 / 文稿</h3>
              <ul id="transcriptFiles"></ul>
            </div>
            <div>
              <h3>文章</h3>
              <ul id="articleFiles"></ul>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
